<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Task Manager</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #3f28d5 100%);
      margin: 0;
      padding: 20px;
      color: #676666;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 50px;
    }
    h1 {
      text-align: center;
      color: #4a5568;
      margin-bottom: 30px;
    }
    .add-task {
      display: flex;
      margin-bottom: 20px;
    }
    #taskTitle {
      flex: 1;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 5px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
      transition: background 0.3s;
    }
    button:hover {
      background: #5a67d8;
    }
    .task-list {
      list-style: none;
      padding: 0;
    }
    .task-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      margin-bottom: 10px;
      background: #f7fafc;
    }
    .task-item.completed {
      background: #c6f6d5;
      text-decoration: line-through;
    }
    .task-checkbox {
      margin-right: 15px;
    }
    .task-title {
      flex: 1;
      margin-right: 15px;
    }
    .task-edit {
      display: none;
      flex: 1;
      margin-right: 15px;
    }
    .task-edit input {
      width: 100%;
      padding: 5px;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
    }
    .edit-btn {
      background: #48bb78;
    }
    .edit-btn:hover {
      background: #38a169;
    }
    .delete-btn {
      background: #e53e3e;
      margin-left: 5px;
    }
    .delete-btn:hover {
      background: #c53030;
    }
    .save-btn, .cancel-btn {
      background: #3182ce;
      margin-left: 5px;
    }
    .save-btn:hover, .cancel-btn:hover {
      background: #2c5282;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Modern Task Manager</h1>

    <div class="add-task">
      <input type="text" id="taskTitle" placeholder="Enter a new task..." />
      <button onclick="createTask()">Add Task</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
  </div>

  <script>
    const API_URL = "http://localhost:3000/api/tasks";

    async function createTask() {
      const title = document.getElementById("taskTitle").value.trim();
      if (!title) return alert("Please enter a task title");

      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title })
      });

      if (res.ok) {
        document.getElementById("taskTitle").value = "";
        getTasks();
      } else {
        alert("Error creating task");
      }
    }

    async function getTasks() {
      const res = await fetch(API_URL);
      const tasks = await res.json();

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.className = `task-item ${task.completed ? 'completed' : ''}`;

        li.innerHTML = `
          <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id}, this.checked)">
          <span class="task-title">${task.title}</span>
          <input type="text" class="task-edit" value="${task.title}">
          <button class="edit-btn" onclick="startEdit(this)">Edit</button>
          <button class="save-btn" style="display:none" onclick="saveEdit(${task.id}, this)">Save</button>
          <button class="cancel-btn" style="display:none" onclick="cancelEdit(this)">Cancel</button>
          <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
        `;

        list.appendChild(li);
      });
    }

    async function toggleComplete(id, completed) {
      await fetch(`${API_URL}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed })
      });
      getTasks();
    }

    function startEdit(btn) {
      const li = btn.parentElement;
      li.querySelector('.task-title').style.display = 'none';
      li.querySelector('.task-edit').style.display = 'block';
      li.querySelector('.edit-btn').style.display = 'none';
      li.querySelector('.save-btn').style.display = 'inline-block';
      li.querySelector('.cancel-btn').style.display = 'inline-block';
    }

    async function saveEdit(id, btn) {
      const li = btn.parentElement;
      const newTitle = li.querySelector('.task-edit').value.trim();
      if (!newTitle) return alert("Title cannot be empty");

      const res = await fetch(`${API_URL}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: newTitle })
      });

      if (res.ok) {
        getTasks();
      } else {
        alert("Error updating task");
      }
    }

    function cancelEdit(btn) {
      const li = btn.parentElement;
      li.querySelector('.task-title').style.display = 'block';
      li.querySelector('.task-edit').style.display = 'none';
      li.querySelector('.edit-btn').style.display = 'inline-block';
      li.querySelector('.save-btn').style.display = 'none';
      li.querySelector('.cancel-btn').style.display = 'none';
      li.querySelector('.task-edit').value = li.querySelector('.task-title').textContent;
    }

    async function deleteTask(id) {
      if (!confirm("Are you sure you want to delete this task?")) return;

      const res = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
      if (res.ok) {
        getTasks();
      } else {
        alert("Error deleting task");
      }
    }

    // Load tasks on page load
    getTasks();
  </script>
</body>
</html>
